# Plantilla estandarizada para ejecución de pruebas en TechMarket
# Versión: v1.0.0
name: Template Test v1.0.0
on:
  workflow_call:
    inputs:
      test-command:
        required: true
        type: string
        default: 'npm test'
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install
      - run: ${{ inputs.test-command }}
