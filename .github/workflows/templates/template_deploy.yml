# Plantilla estandarizada para el despliegue de aplicaciones en TechMarket
# Versión: v1.0.0

name: Template Deploy v1.0.0

on:
  workflow_call:
    inputs:
      environment:
        description: "Ambiente de despliegue (dev, test, prod)"
        required: true
        type: string
      region:
        description: "Región de despliegue en AWS"
        required: true
        type: string
        default: 'us-east-1'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Clona el repositorio (acción externa)
      - name: Checkout code
        uses: actions/checkout@v4

      # Configura región de AWS (simulación de entorno cloud)
      - name: Configure AWS region
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ inputs.region }}

      # Simulación de despliegue
      - name: Deploy application
        run: |
          echo "Iniciando despliegue..."
          echo "Ambiente: ${{ inputs.environment }}"
          echo "Región: ${{ inputs.region }}"
          echo "Despliegue completado correctamente"
