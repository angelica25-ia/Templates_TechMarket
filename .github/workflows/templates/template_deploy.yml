name: Template Deploy v1.0.0
on:
  workflow_call:
    inputs:
      environment:
        required: true
      region:
        required: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ inputs.region }}
      - run: echo "Deploy en ${{ inputs.environment }}"
